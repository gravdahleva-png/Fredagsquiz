<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Fredagsquiz – test</title>
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: auto;
    padding: 10px;
  }
  .question {
    margin-bottom: 20px;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 12px;
  }
  .answerBox {
    display: none;
    margin-top: 10px;
    background: #f5f7fa;
    padding: 8px;
    border-radius: 6px;
  }
  button {
    margin-top: 6px;
    padding: 6px 12px;
    font-weight: bold;
  }
</style>
</head>

<body>
<h2>🎉 Fredagsquiz</h2>
<p>Svar på hvert spørsmål. Fasit vises først etter at svaret er sendt.</p>

<div id="quiz"></div>

<script>
const questions = [
  {
    q: "Hva heter verdens største hav?",
    a: "Stillehavet"
  },
  {
    q: "Hvem var USAs andre president?",
    a: "John Adams"
  },
  {
    q: "Hvor mange ringer er det i det olympiske flagget?",
    a: "Fem"
  }
];

const quizEl = document.getElementById("quiz");

questions.forEach((item, i) => {
  const div = document.createElement("div");
  div.className = "question";
  div.innerHTML = `
    <b>${i + 1}. ${item.q}</b><br><br>
    <input type="text" id="svar${i}" placeholder="Skriv svaret her" style="width:100%">
    <br>
    <button onclick="submitAnswer(${i})">Send svar</button>

    <div class="answerBox" id="fasit${i}">
      <b>Fasit:</b> ${item.a}
    </div>
  `;
  quizEl.appendChild(div);
});

function submitAnswer(i) {
  const input = document.getElementById("svar" + i);
  if (input.value.trim() === "") {
    alert("Skriv inn et svar først 🙂");
    return;
  }
  document.getElementById("fasit" + i).style.display = "block";
}
</script>

</body>
</html>
